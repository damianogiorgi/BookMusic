<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookMusic</title>
  <!-- Strudel runtime: the full REPL engine, so it loads the same sounds as strudel.cc
       (gm_ soundfonts, drum samples, piano). Provides the <strudel-editor> component. -->
  <script src="https://unpkg.com/@strudel/repl@1.3.0"></script>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <header>
    <h1>BookMusic</h1>
    <div class="controls">
      <button id="start" disabled>▶ Start</button>
      <button id="prev" disabled>← Prev</button>
      <button id="next" disabled>Next →</button>
      <button id="stop" disabled>■ Stop</button>
      <span id="status" class="status">Load a document to begin.</span>
    </div>
  </header>

  <main>
    <section id="reading" class="reading">
      <div class="loader">
        <textarea id="text-input" placeholder="Paste text here, or it will pre-load the sample…"></textarea>
        <div class="loader-row">
          <input type="file" id="file-input" accept=".txt,text/plain" />
          <button id="load">Load text</button>
        </div>
      </div>
      <div id="paragraphs"></div>
    </section>

    <aside class="sidebar">
      <h2>Now playing</h2>
      <!-- The live Strudel editor: shows the code being played and highlights the
           active events in real time. We drive it programmatically (setCode/evaluate). -->
      <strudel-editor id="strudel-engine"></strudel-editor>
    </aside>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
